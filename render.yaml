services:
  - type: web
    name: dar-el-hayah
    env: python
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --reuse-port main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dar-el-hayah-db
          property: connectionString

databases:
  - name: dar-el-hayah-db
    databaseName: dar_el_hayah
    ipAllowList: []  # optional (allows all IPs by default)